<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>futur</title>
    <style>
      body {
        background: #000;
      }
      div {
        height: 600px;
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        background: #000;
        justify-content: center;
        align-items: center;
      }
      h1 {
        text-align: center;
        font-size: 30px;
        color: #c57d11;
        font-family: monospace;
      }
      img {
        display: flex;
        border-radius: 12px;
        transition: 0.4s;
        cursor: pointer;
      }
      img:hover {
        border: 1px solid aqua;
        scale: 1.09;
      }
      div a {
        background: #ff004c;
        padding: 12px 20px;
        border-radius: 25px;
        color: white;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
      }
      div a:hover {
        scale: 1.09;
        color: aqua;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Desolé mais, coder tout seul sans</h1>
      <img src="gpt.png" alt="" />
      <h1>ca prend du temps !🕞</h1>
      <a href="galerie.html">⬅  Retour 😅</a>
    </div>
  </body>
